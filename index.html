<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wasteland Market Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <button class="burger" onclick="toggleSidebar()">☰</button>
        <h1>☢️ WASTELAND MARKET</h1>
        <div class="header-balance">
            <span>💰</span>
            <input type="number" id="balanceInput" value="1000" step="0.01" onchange="updateBalance()">
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <button onclick="switchScreen('items');toggleSidebar()">📦 Предметы</button>
        <button onclick="switchScreen('trades');toggleSidebar()">💰 Сделки</button>
        <button onclick="switchScreen('events');toggleSidebar()">📅 События</button>
        <button onclick="switchScreen('market');toggleSidebar()">📊 Рынок</button>
    </div>

    <!-- Предметы -->
    <div class="screen active" id="screen-items">
        <h2>📦 ПРЕДМЕТЫ</h2>
        <div class="row">
            <input type="text" id="newItemName" placeholder="Название">
            <select id="newItemType">
                <option value="resource">Ресурс</option>
                <option value="part">Деталь</option>
            </select>
            <button class="accent" onclick="addItemForm()">➕</button>
        </div>
        <div id="itemsList"></div>
        <div id="priceEntry" style="display:none;"></div>
    </div>

    <!-- Сделки -->
    <div class="screen" id="screen-trades">
        <h2>💰 СДЕЛКИ</h2>
        <div class="row">
            <select id="tradeItemSelect"></select>
            <input type="number" id="tradeBuyPrice" placeholder="Покупка" step="0.01">
            <input type="number" id="tradeSellPrice" placeholder="Продажа" step="0.01">
            <button class="accent" onclick="submitTrade()">OK</button>
        </div>
        <table id="tradesTable"><thead><tr><th>Предмет</th><th>Куплен</th><th>Продан</th><th>+/-</th><th>%</th><th></th></tr></thead><tbody></tbody></table>
        <div id="tradeStats"></div>
    </div>

    <!-- События -->
    <div class="screen" id="screen-events">
        <h2>📅 СОБЫТИЯ</h2>
        <div class="row">
            <input type="date" id="eventDate">
            <select id="eventType">
                <option value="factory">🏭 Фабрика</option>
                <option value="rating_end">⚔️ Рейтинг</option>
                <option value="battlepass">🎫 БП</option>
                <option value="road">🛣️ Наследие</option>
                <option value="raven">🐦‍⬛ Ворон</option>
                <option value="workshop">🔧 Цех</option>
                <option value="bounty">🎯 Охота</option>
            </select>
            <button class="accent" onclick="submitEvent()">➕</button>
        </div>
        <div class="calendar" id="calendarWidget"></div>
        <div id="eventsList"></div>
    </div>

    <!-- Рынок -->
    <div class="screen" id="screen-market">
        <h2>📊 РЫНОК</h2>
        <div class="market-tabs">
            <button class="market-tab active" onclick="switchMarketTab('overview')">📈 Общий</button>
            <button class="market-tab" onclick="switchMarketTab('resources')">⛏️ Ресурсы</button>
            <button class="market-tab" onclick="switchMarketTab('parts')">🔧 Детали</button>
        </div>
        <div id="marketContent"></div>
    </div>

    <script src="core.js"></script>
    <script src="ui.js"></script>
</body>
</html>
