<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wasteland Market Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>☢️ WASTELAND MARKET TERMINAL</h1>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('items')">📦 ПРЕДМЕТЫ</div>
        <div class="tab" onclick="switchTab('trades')">💰 СДЕЛКИ</div>
        <div class="tab" onclick="switchTab('analytics')">📊 АНАЛИТИКА</div>
        <div class="tab" onclick="switchTab('events')">📅 СОБЫТИЯ</div>
        <div class="tab" onclick="switchTab('insights')">💡 ИНСАЙТЫ</div>
    </div>

    <!-- Предметы и цены -->
    <div class="panel active" id="tab-items">
        <h2>📦 ПРЕДМЕТЫ НАБЛЮДЕНИЯ</h2>
        <div class="row">
            <input type="text" id="newItemName" placeholder="Название предмета">
            <input type="text" id="newItemType" placeholder="Тип (ресурс/оружие/кабина/колёса/модуль)">
            <button class="accent" onclick="addItem()">ДОБАВИТЬ</button>
        </div>
        <div id="itemsList"></div>

        <div id="priceEntry" style="display:none; margin-top:10px;">
            <h2>📝 ЗАПИСЬ ДЛЯ: <span id="selectedItemName"></span></h2>
            <div class="row">
                <input type="datetime-local" id="entryTime">
            </div>
            <div class="row">
                <input type="number" id="entryBuy" placeholder="Цена покупки" step="0.01">
                <input type="number" id="entrySell" placeholder="Цена продажи" step="0.01">
            </div>
            <div class="row">
                <select id="entryEvent">
                    <option value="">Без события</option>
                    <optgroup label="Регулярные ивенты">
                        <option value="factory">🏭 Подпольная фабрика</option>
                        <option value="rating_end">⚔️ Конец рейтинга (раздача руды)</option>
                        <option value="battlepass">🎫 Новый боевой пропуск</option>
                        <option value="road">🛣️ Наследие пустоши</option>
                        <option value="raven">🐦‍⬛ Дорога ворона</option>
                        <option value="workshop">🔧 Цех модификаций</option>
                        <option value="bounty">🎯 Охота за головами</option>
                    </optgroup>
                    <optgroup label="Баланс">
                        <option value="nerf">🔻 Нерф предмета</option>
                        <option value="buff">🔺 Бафф предмета</option>
                        <option value="new_item">🆕 Новый предмет</option>
                    </optgroup>
                    <optgroup label="Разное">
                        <option value="gift">🎁 Подарки новичкам</option>
                        <option value="bearings">⚙️ Событие с подшипниками</option>
                    </optgroup>
                </select>
            </div>
            <div class="row">
                <button class="accent" onclick="addPriceEntry()">ЗАПИСАТЬ ЦЕНУ</button>
                <button class="danger" onclick="deleteSelectedItem()">УДАЛИТЬ ПРЕДМЕТ</button>
            </div>
            <div id="itemAnalytics"></div>
        </div>
    </div>

    <!-- Сделки -->
    <div class="panel" id="tab-trades">
        <h2>💰 ЖУРНАЛ СДЕЛОК</h2>
        <div class="row">
            <select id="tradeItemSelect"></select>
            <input type="number" id="tradeBuyPrice" placeholder="Цена покупки" step="0.01">
            <input type="number" id="tradeSellPrice" placeholder="Цена продажи" step="0.01">
            <button class="accent" onclick="addTrade()">ЗАПИСАТЬ СДЕЛКУ</button>
        </div>
        <table id="tradesTable">
            <thead><tr><th>Предмет</th><th>Куплен</th><th>Продан</th><th>Прибыль</th><th>%</th><th>Уверенность</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <div id="tradeStats" style="margin-top:10px;"></div>
    </div>

    <!-- Аналитика -->
    <div class="panel" id="tab-analytics">
        <h2>📊 САМООБУЧАЮЩАЯСЯ АНАЛИТИКА</h2>
        <select id="analyticsItemSelect" onchange="renderAnalytics()"></select>
        <div id="analyticsContent"></div>
    </div>

    <!-- События -->
    <div class="panel" id="tab-events">
        <h2>📅 КАЛЕНДАРЬ СОБЫТИЙ</h2>
        <div class="row">
            <input type="date" id="eventDate">
            <select id="eventType">
                <optgroup label="Регулярные ивенты">
                    <option value="factory">🏭 Подпольная фабрика</option>
                    <option value="rating_end">⚔️ Конец рейтинга (раздача руды)</option>
                    <option value="battlepass">🎫 Новый боевой пропуск</option>
                    <option value="road">🛣️ Наследие пустоши</option>
                    <option value="raven">🐦‍⬛ Дорога ворона</option>
                    <option value="workshop">🔧 Цех модификаций</option>
                    <option value="bounty">🎯 Охота за головами</option>
                </optgroup>
                <optgroup label="Баланс">
                    <option value="nerf">🔻 Нерф</option>
                    <option value="buff">🔺 Бафф</option>
                    <option value="new_item">🆕 Новый предмет</option>
                </optgroup>
                <optgroup label="Разное">
                    <option value="gift">🎁 Подарки новичкам</option>
                    <option value="bearings">⚙️ Событие с подшипниками</option>
                </optgroup>
            </select>
            <input type="text" id="eventDesc" placeholder="Описание">
            <button class="accent" onclick="addEvent()">➕</button>
        </div>
        <div id="eventsList"></div>
    </div>

    <!-- Инсайты -->
    <div class="panel" id="tab-insights">
        <h2>💡 ТВОИ НАБЛЮДЕНИЯ</h2>
        <div class="row">
            <select id="insightItemSelect"></select>
        </div>
        <textarea id="insightText" placeholder="Опиши закономерность. Например: После конца рейтинга руда дешевеет на 15% за 2 дня, потом восстанавливается."></textarea>
        <button class="accent" onclick="addInsight()" style="margin-top:6px;">💾 СОХРАНИТЬ ИНСАЙТ</button>
        <div id="insightsList" style="margin-top:10px;"></div>
    </div>

    <script src="app.js"></script>
</body>
  </html>
